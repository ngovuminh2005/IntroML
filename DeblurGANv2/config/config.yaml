---
project: deblur_gan
experiment_desc: fpn

train:
  files_a: &FILES_A ../datasets/deblurring/train/GoPro/full/input/*.png
  files_b: &FILES_B ../datasets/deblurring/train/GoPro/full/target/*.png
  size: &SIZE 256
  crop: random
  preload: &PRELOAD false
  preload_size: &PRELOAD_SIZE 0
  bounds: [0, .9]
  scope: geometric
  corrupt: &CORRUPT
    - name: gamma
    - name: rgb_shift
    - name: hsv_shift
    - name: sharpen

val:
  files_a: *FILES_A
  files_b: *FILES_B
  size: *SIZE
  scope: geometric
  crop: center
  preload: *PRELOAD
  preload_size: *PRELOAD_SIZE
  bounds: [.9, 1]
  corrupt: *CORRUPT

phase: train
warmup_num: 3
model:
  g_name: fpn_inception
  blocks: 9
  d_name: double_gan # may be no_gan, patch_gan, double_gan, multi_scale
  d_layers: 3
  content_loss: perceptual
  adv_lambda: 0.001
  disc_loss: wgan-gp
  learn_residual: True
  norm_layer: instance
  dropout: True

num_epochs: 200
train_batches_per_epoch: 500
val_batches_per_epoch: 100
batch_size: 4
image_size: [256, 256]

optimizer:
  name: adam
  lr: 0.0002
scheduler:
  name: linear
  start_epoch: 75
  min_lr: 0.0000001
